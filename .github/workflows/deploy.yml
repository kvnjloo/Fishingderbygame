name: Build and Deploy to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch: # This is the line that creates the 'Run workflow' button

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Production (The Brains) 🧠
        uses: actions/checkout@v4

      - name: Checkout Main (The Figma Art) 🛎️
        uses: actions/checkout@v4
        with:
          ref: main
          path: figma-files # This puts Figma's stuff in a separate folder so it doesn't overwrite your scripts

      - name: Setup Node 🏗️
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Sync and Build 🔧
        run: |
          # 1. Clear out any old build data
          rm -rf dist || true
          
          # 2. Grab the art from Figma (this might include a 'bad' config)
          cp -r figma-files/* . || true 
          
          # 3. THE MASTER MOVE: Overwrite Figma's config with your 'Boss' config
          # We use -f to force it and ensure it's sitting in the root folder
          cp vite.config.ts vite.config.ts.tmp && mv -f vite.config.ts.tmp vite.config.ts
          
          # 4. Standard Build
          npm install
          npm run build
          
          # 5. THE FORCE-CHANGE MOVE: Create a unique file so GitHub CANNOT skip the deploy
          # This creates a file called 'build-time.txt' with the current time inside it.
          date > dist/build-time.txt
          
          # 6. DIAGNOSTIC
          ls -R dist
      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true      # Wipes the old broken files first
          force: true      # Forces the update even if the Robot is "unsure"
          git-config-name: kvnjloo
          git-config-email: kvnjloo@users.noreply.github.com
