name: Build and Deploy to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch: # This is the line that creates the 'Run workflow' button

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Production (The Brains) 🧠
        uses: actions/checkout@v4

      - name: Checkout Main (The Figma Art) 🛎️
        uses: actions/checkout@v4
        with:
          ref: main
          path: figma-files # This puts Figma's stuff in a separate folder so it doesn't overwrite your scripts

      - name: Setup Node 🏗️
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Sync and Build 🔧
        run: |
          # 1. Clean the deck
          rm -rf dist || true
          
          # 2. Grab Figma Art (into a temporary room)
          # We don't use 'cp -r' here because it overwrites our Boss files.
          # Instead, we only move the 'src' and 'public' folders from Figma.
          cp -rf figma-files/src ./src || true
          cp -rf figma-files/public ./public || true
          
          # 3. VERIFY: We are using the Production Boss files
          # We don't move these; we just ensure they stay put.
          npm install
          
          # 4. The Build
          npm run build
          
          # 5. Diagnostic: Check the index.html BEFORE we deploy
          grep "src=" dist/index.html
      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true      # Wipes the old broken files first
          single-commit: true #
