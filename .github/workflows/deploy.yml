name: Build and Deploy to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch: # This is the line that creates the 'Run workflow' button

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Production (The Brains) 🧠
        uses: actions/checkout@v4

      - name: Checkout Main (The Figma Art) 🛎️
        uses: actions/checkout@v4
        with:
          ref: main
          path: figma-files # This puts Figma's stuff in a separate folder so it doesn't overwrite your scripts

      - name: Setup Node 🏗️
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Sync and Build 🔧
        run: |
          # This moves Figma's new art into your working area without deleting your package.json
          cp -r figma-files/* . 
          npm install
          npm run build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
