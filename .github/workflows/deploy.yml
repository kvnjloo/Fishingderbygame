name: Build and Deploy to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch: # This is the line that creates the 'Run workflow' button

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Production (The Brains) 🧠
        uses: actions/checkout@v4

      - name: Checkout Main (The Figma Art) 🛎️
        uses: actions/checkout@v4
        with:
          ref: main
          path: figma-files # This puts Figma's stuff in a separate folder so it doesn't overwrite your scripts

      - name: Setup Node 🏗️
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Sync and Build 🔧
        run: |
          # 1. Clean out any old build attempts
          rm -rf dist || true
          # This moves Figma's new art into your working area without deleting your package.json
          cp -r figma-files/* . || true 
          # 3. FORCE your Production "Boss" config (This is the most important part!)
          cp -f figma-files/vite.config.ts ./vite.config.ts || echo "Config already in root"
          # 4. Standard Build
          npm install
          npm run build
          # 5. DIAGNOSTIC: Check if the build actually worked
          ls -R dist # This prints the folder contents to the log so we can see them

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          force: true # This forces GitHub to acknowledge the new files
